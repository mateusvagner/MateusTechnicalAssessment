name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
    unitTests:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v5
        - name: set up JDK
          uses: actions/setup-java@v5
          with:
            java-version: 17
            distribution: 'temurin'
            cache: gradle
        - name: Grant execute permission for gradlew
          run: chmod +x gradlew
        - name: Run unit tests with Gradle
          run: ./gradlew testDebugUnitTest
